name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.16"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check app tests
      - name: Run tests
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      # Biome is owned at the repo root (biome.json lives there and globs frontend/**),
      # so lint runs from root to match the config. The frontend package builds only.
      - name: Install Biome (repo root)
        run: npm ci
      - name: Lint (Biome)
        run: npm run lint
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (type-check + bundle)
        working-directory: frontend
        run: npm run build
